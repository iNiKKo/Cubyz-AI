<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ash</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #f7f7f8;
    --panel: #ffffff;
    --border: #e2e2e6;
    --text: #1a1a1e;
    --text-dim: #6b6b73;
    --accent: #2f6feb;
    --user-bubble: #2f6feb;
    --user-bubble-text: #ffffff;
    --assistant-bubble: #ffffff;
    --assistant-bubble-text: #1a1a1e;
    --code-bg: #eef0f3;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #16171b;
      --panel: #1e1f24;
      --border: #303138;
      --text: #ececec;
      --text-dim: #9a9aa2;
      --accent: #5b8def;
      --user-bubble: #2f5fc4;
      --user-bubble-text: #ffffff;
      --assistant-bubble: #26272d;
      --assistant-bubble-text: #ececec;
      --code-bg: #0f1013;
    }
  }
  /* Manual override from the theme toggle button -- wins over prefers-color-scheme in either
     direction since these are plain selectors evaluated after the media-query block above. */
  :root[data-theme="light"] {
    --bg: #f7f7f8; --panel: #ffffff; --border: #e2e2e6; --text: #1a1a1e; --text-dim: #6b6b73;
    --accent: #2f6feb; --user-bubble: #2f6feb; --user-bubble-text: #ffffff;
    --assistant-bubble: #ffffff; --assistant-bubble-text: #1a1a1e; --code-bg: #eef0f3;
  }
  :root[data-theme="dark"] {
    --bg: #16171b; --panel: #1e1f24; --border: #303138; --text: #ececec; --text-dim: #9a9aa2;
    --accent: #5b8def; --user-bubble: #2f5fc4; --user-bubble-text: #ffffff;
    --assistant-bubble: #26272d; --assistant-bubble-text: #ececec; --code-bg: #0f1013;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    /* Android Chrome auto-boosts font size on narrow columns of text unless told not to --
       iOS Safari doesn't do this the same way, so a page can look correct on iPhone and
       oddly oversized/"zoomed" on Android with the exact same CSS otherwise. Reported live:
       an Android visitor saw a scaled-weird header and a What's New modal whose Okay button
       had scaled out of reach, while the same page looked fine on iPhone. overflow-x:hidden
       is a cheap safety net against anything (badges, long content) pushing the page wider
       than the viewport and forcing an unwanted zoom-to-fit on top of that. */
    -webkit-text-size-adjust: 100%;
    text-size-adjust: 100%;
    overflow-x: hidden;
  }
  #app {
    display: flex; flex-direction: column; height: 100dvh; max-width: 1180px; width: 100%; margin: 0 auto;
  }
  header {
    padding: 14px 24px; border-bottom: 1px solid var(--border); background: var(--panel);
    display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; gap: 16px;
  }
  header h1 { font-size: 16px; margin: 0; font-weight: 600; display: flex; align-items: center; gap: 8px; }
  header .sub { font-size: 12px; color: var(--text-dim); margin-top: 3px; }
  header .headerLeft { min-width: 0; }
  header .headerBtns { display: flex; gap: 8px; align-items: center; flex-shrink: 0; }
  .status-dot {
    width: 7px; height: 7px; border-radius: 50%; background: #9a9aa2; flex-shrink: 0;
  }
  .status-dot.ok { background: #3fb950; }
  .status-dot.down { background: #d14343; }
  .model-badge {
    display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 500;
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    color: var(--accent); background: var(--code-bg); border: 1px solid var(--border);
    border-radius: 20px; padding: 3px 10px 3px 8px; white-space: nowrap;
  }
  .model-badge .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
  .model-badge:empty { display: none; }
  .headerBtn, #newChatBtn {
    background: none; border: 1px solid var(--border); color: var(--text-dim);
    padding: 6px 12px; border-radius: 8px; font-size: 13px; cursor: pointer;
    text-decoration: none; display: inline-flex; align-items: center; gap: 6px; line-height: 1.2;
  }
  .headerBtn:hover, #newChatBtn:hover { border-color: var(--accent); color: var(--accent); }
  .headerBtn svg { width: 14px; height: 14px; flex-shrink: 0; }
  #themeBtn { padding: 6px 8px; }

  #messages {
    flex: 1; overflow-y: auto; padding: 20px 24px; display: flex; flex-direction: column; gap: 14px;
  }
  /* Deliberately NOT flexbox for .msg/.msg-col -- every flex-based attempt here (justify-content,
     then width:fit-content, then width:max-content, all confirmed correct in an isolated 2-level
     test) still measurably mis-sized the bubble in the real page, where flex nests 4-5 levels deep
     (#app -> #messages -> .msg -> .msg-col -> .bubble). Devtools confirmed width:max-content WAS
     the winning, uncontested rule, yet computed width still came out too narrow for the text.msg {
     (~49px for "hello" including 28px of padding) -- a real browser edge case in flex-basis
     resolution through deep nesting combined with word-wrap:break-word, not a cascade/specificity
     bug. Switched to the pre-flexbox technique instead: text-align on the block-level .msg row to
     position its content left/right, and plain inline-block shrink-to-fit on .msg-col/.bubble.
     inline-block's shrink-to-fit algorithm is a completely different, much older code path that
     never touches flex-basis resolution at all, so it can't hit this bug. Confirmed working via a
     3-way isolated comparison (flex/max-content, plain block+nowrap, table-cell) before landing on
     this -- inline-block was chosen over table-cell for simplicity, same underlying guarantee. */
  .msg { max-width: 100%; }
  .msg.user { text-align: right; }
  .msg.assistant { text-align: left; }
  .msg-col { display: inline-block; max-width: 100%; text-align: left; }
.bubble {
    display: inline-block;
    width: max-content;
    max-width: min(80%, 760px);

    padding: 10px 14px;
    border-radius: 14px;
    line-height: 1.5;
    font-size: 14.5px;

    white-space: pre-wrap;
    overflow-wrap: break-word;
    word-break: normal;

    box-shadow: 0 1px 2px rgba(0,0,0,.05);
}
.msg.user .bubble {
    background: var(--user-bubble);
    color: var(--user-bubble-text);
    border-bottom-right-radius: 4px;

    /* Small messages don't become tiny */
    min-width: 70px;

    /* Long messages still wrap */
    max-width: min(80%, 760px);

    text-align: left;
}

.msg.assistant .bubble {
    background: var(--assistant-bubble);
    color: var(--assistant-bubble-text);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;

    max-width: min(80%, 760px);
}
  .bubble code {
    background: var(--code-bg); padding: 1px 5px; border-radius: 4px;
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 13px;
  }
  .bubble pre {
    background: var(--code-bg); padding: 10px 12px; border-radius: 8px; overflow-x: auto; margin: 6px 0;
  }
  .bubble pre code { background: none; padding: 0; }
  .bubble pre { position: relative; }
  .copy-btn {
    position: absolute; top: 6px; right: 6px; background: var(--panel); color: var(--text-dim);
    border: 1px solid var(--border); border-radius: 6px; font-size: 11px; padding: 2px 7px;
    cursor: pointer; opacity: 0; transition: opacity 0.15s;
  }
  .bubble pre:hover .copy-btn { opacity: 1; }
  .copy-btn:hover { color: var(--text); border-color: var(--accent); }

  .msg.enter { animation: msgIn 0.2s ease-out; }
  @keyframes msgIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

  .msg-meta {
    display: flex; gap: 10px; align-items: center; margin-top: 5px; padding-left: 2px;
    font-size: 11.5px; color: var(--text-dim);
  }
  .msg-meta .sources-toggle {
    background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 11.5px;
    padding: 0; text-decoration: underline; text-decoration-style: dotted;
  }
  .msg-meta .sources-toggle:hover { color: var(--accent); }
  .sources-list {
    display: flex; flex-wrap: wrap; gap: 5px; margin-top: 6px; padding-left: 2px; max-width: min(80%, 760px);
  }
  .source-chip {
    font-size: 11px; color: var(--text-dim); background: var(--code-bg); border: 1px solid var(--border);
    border-radius: 6px; padding: 3px 7px; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  }

  .feedback-row {
    display: flex; gap: 2px; margin-top: 4px; padding-left: 2px;
  }
  .feedback-btn {
    background: none; border: none; cursor: pointer; padding: 3px 6px; border-radius: 6px;
    font-size: 13px; opacity: 0.4; line-height: 1;
  }
  .feedback-btn:hover { opacity: 0.8; background: var(--code-bg); }
  .feedback-btn.active { opacity: 1; background: var(--code-bg); }

  .feedback-note {
    display: flex; gap: 6px; margin-top: 6px; padding-left: 2px; align-items: flex-end;
  }
  .feedback-note textarea {
    flex: 1; resize: none; border: 1px solid var(--border); border-radius: 8px;
    padding: 6px 10px; font-size: 13px; font-family: inherit; background: var(--bg); color: var(--text);
    min-height: 32px; max-height: 100px; line-height: 1.4;
  }
  .feedback-note textarea:focus { outline: none; border-color: var(--accent); }
  .feedback-note button {
    background: var(--accent); color: white; border: none; border-radius: 8px;
    padding: 6px 12px; font-size: 12.5px; cursor: pointer; flex-shrink: 0;
  }
  .feedback-note button:hover { filter: brightness(1.1); }
  .feedback-note-saved {
    font-size: 12px; color: var(--text-dim); margin-top: 4px; padding-left: 2px;
  }

  .empty-state {
    margin: auto; text-align: center; color: var(--text-dim); padding: 40px 20px;
  }
  .empty-state h2 { color: var(--text); font-size: 18px; margin-bottom: 6px; }
  .empty-state p { font-size: 13.5px; max-width: 400px; margin: 0 auto; }

  .typing { display: flex; gap: 4px; padding: 4px 2px; }
  .typing span {
    width: 6px; height: 6px; border-radius: 50%; background: var(--text-dim);
    animation: bounce 1.2s infinite ease-in-out;
  }
  .typing span:nth-child(2) { animation-delay: 0.15s; }
  .typing span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes bounce { 0%, 60%, 100% { transform: translateY(0); opacity: 0.4; } 30% { transform: translateY(-5px); opacity: 1; } }
  .compacting-note { font-size: 13px; color: var(--text-dim); font-style: italic; }

  #inputBar {
    flex-shrink: 0; padding: 14px 24px calc(env(safe-area-inset-bottom, 0) + 14px);
    border-top: 1px solid var(--border); background: var(--panel);
    display: flex; gap: 10px; align-items: flex-end;
  }
  #textInput {
    flex: 1; resize: none; border: 1px solid var(--border); border-radius: 12px;
    padding: 10px 14px; font-size: 14.5px; font-family: inherit; background: var(--bg); color: var(--text);
    max-height: 140px; min-height: 42px; line-height: 1.4;
  }
  #textInput:focus { outline: none; border-color: var(--accent); }
  #textInput:disabled { opacity: 0.6; cursor: not-allowed; }
  #sendBtn {
    background: var(--accent); color: white; border: none; border-radius: 12px;
    width: 42px; height: 42px; flex-shrink: 0; cursor: pointer; font-size: 16px;
    display: flex; align-items: center; justify-content: center;
  }
  #sendBtn:hover { filter: brightness(1.1); }
  #sendBtn.stopBtn { background: #d14343; }

  .error-note { color: #d14343; font-size: 13px; text-align: center; padding: 8px; }

  #whatsNewOverlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45);
    align-items: center; justify-content: center; padding: 20px; z-index: 100;
  }
  #whatsNewOverlay.show { display: flex; }
  #whatsNewModal {
    background: var(--panel); color: var(--text); border: 1px solid var(--border);
    border-radius: 14px; padding: 22px 24px; max-width: 380px; width: 100%;
    /* max-height + overflow-y so the Okay button stays reachable by scrolling within the
       modal itself no matter what -- a safety net against any font-scaling quirk (or just a
       long changelog) pushing content taller than the viewport. */
    max-height: 85vh; overflow-y: auto;
    box-shadow: 0 12px 32px rgba(0,0,0,0.25);
  }
  #whatsNewModal h2 { margin: 0 0 12px; font-size: 17px; }
  #whatsNewModal ul { margin: 0 0 12px; padding-left: 20px; font-size: 13.5px; line-height: 1.6; color: var(--text); }
  #whatsNewModal li { margin-bottom: 4px; }
  #whatsNewHistoryToggle {
    background: none; border: none; color: var(--text-dim); font-size: 12px; cursor: pointer;
    padding: 0; margin-bottom: 14px; text-decoration: underline; text-decoration-style: dotted;
  }
  #whatsNewHistoryToggle:hover { color: var(--accent); }
  #whatsNewHistory { display: none; margin-bottom: 14px; }
  #whatsNewHistory.show { display: block; }
  #whatsNewHistory .history-entry { margin-bottom: 14px; }
  #whatsNewHistory .history-date {
    font-size: 11px; color: var(--text-dim); font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.03em; margin-bottom: 4px;
  }
  #whatsNewHistory ul { margin: 0; padding-left: 20px; font-size: 13px; line-height: 1.5; color: var(--text-dim); }
  #whatsNewOkBtn {
    background: var(--accent); color: #fff; border: none; border-radius: 8px;
    padding: 8px 20px; font-size: 13.5px; cursor: pointer; display: block; margin-left: auto;
  }
  #whatsNewOkBtn:hover { filter: brightness(1.1); }

  #infoOverlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45);
    align-items: center; justify-content: center; padding: 20px; z-index: 100;
  }
  #infoOverlay.show { display: flex; }
  #infoModal {
    background: var(--panel); color: var(--text); border: 1px solid var(--border);
    border-radius: 14px; padding: 22px 24px; max-width: 440px; width: 100%;
    max-height: 85vh; overflow-y: auto;
    box-shadow: 0 12px 32px rgba(0,0,0,0.25);
  }
  #infoModal h2 { margin: 0 0 12px; font-size: 17px; }
  #infoBody { font-size: 13.5px; line-height: 1.5; color: var(--text); margin-bottom: 18px; }
  #infoBody p { margin: 0 0 12px; }
  #infoBody .info-section-title { font-weight: 600; margin-bottom: 6px; }
  #infoBody a { color: var(--accent); text-decoration: underline; text-decoration-style: dotted; }
  #infoBody a:hover { text-decoration-style: solid; }
  #infoBody .info-row {
    display: flex; justify-content: space-between; gap: 10px; padding: 5px 0;
    border-bottom: 1px solid var(--border); color: var(--text-dim);
  }
  #infoBody .info-row:last-child { border-bottom: none; }
  #infoBody .info-row b { color: var(--text); font-weight: 500; }
  #infoOkBtn {
    background: var(--accent); color: #fff; border: none; border-radius: 8px;
    padding: 8px 20px; font-size: 13.5px; cursor: pointer; display: block; margin-left: auto;
  }
  #infoOkBtn:hover { filter: brightness(1.1); }

  @media (max-width: 640px) {
    header { padding: 12px 14px; }
    #messages { padding: 16px 12px; }
    #inputBar { padding: 12px 14px calc(env(safe-area-inset-bottom, 0) + 12px); }
    .model-badge { display: none; }
    .headerBtn .btnLabel { display: none; }
    .headerBtn { padding: 6px 8px; }
  }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="headerLeft">
      <h1>
        <span class="status-dot" id="statusDot" title="Checking..."></span>Ash
        <span class="model-badge" id="modelBadge" title="Currently serving model"></span>
        <span class="model-badge" id="capacityBadge" title="How many people currently have this website open"></span>
      </h1>
      <div class="sub" id="statusSub">Grounded on the real Cubyz docs, codebase, and PR history</div>
    </div>
    <div class="headerBtns">
      <a class="headerBtn" href="https://claude.ai/code/artifact/4def066b-3b7d-4ef2-97ac-779689b6d7a4" target="_blank" rel="noopener" title="Model accuracy leaderboard">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M2 14V8M6 14V4M10 14V9M14 14V2"/></svg>
        <span class="btnLabel">Leaderboard</span>
      </a>
      <a class="headerBtn" href="https://github.com/iNiKKo/Cubyz-AI" target="_blank" rel="noopener" title="View source on GitHub">
        <svg viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8a8 8 0 0 0 5.47 7.59c.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8 8 0 0 0 16 8c0-4.42-3.58-8-8-8z"/></svg>
        <span class="btnLabel">GitHub</span>
      </a>
      <button class="headerBtn" id="infoBtn" title="What is this trained on?">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="8" r="6.5"/><path d="M8 7.2v4.3" stroke-linecap="round"/><circle cx="8" cy="4.8" r="0.7" fill="currentColor" stroke="none"/></svg>
      </button>
      <button class="headerBtn" id="themeBtn" title="Toggle dark/light theme">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" id="themeIcon"></svg>
      </button>
      <button id="newChatBtn">New chat</button>
    </div>
  </header>

  <div id="messages"></div>

  <div id="inputBar">
    <textarea id="textInput" placeholder="Ask about Cubyz..." rows="1"></textarea>
    <button id="sendBtn" title="Send">&#10148;</button>
  </div>
</div>

<div id="whatsNewOverlay">
  <div id="whatsNewModal">
    <h2>What's New!</h2>
    <ul id="whatsNewList"></ul>
    <button id="whatsNewHistoryToggle" type="button">Show older updates</button>
    <div id="whatsNewHistory"></div>
    <button id="whatsNewOkBtn">Okay</button>
  </div>
</div>

<div id="infoOverlay">
  <div id="infoModal">
    <h2>What is this trained on?</h2>
    <div id="infoBody">Loading&hellip;</div>
    <button id="infoOkBtn">Close</button>
  </div>
</div>

<script>
const SUN_PATH = '<path d="M8 1.5v2M8 12.5v2M1.5 8h2M12.5 8h2M3.4 3.4l1.4 1.4M11.2 11.2l1.4 1.4M3.4 12.6l1.4-1.4M11.2 4.8l1.4-1.4"/><circle cx="8" cy="8" r="3.2"/>';
const MOON_PATH = '<path d="M13.5 9.5A5.8 5.8 0 1 1 6.5 2.5a4.6 4.6 0 0 0 7 7z"/>';

function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  document.getElementById('themeIcon').innerHTML = theme === 'dark' ? SUN_PATH : MOON_PATH;
  document.getElementById('themeBtn').title = theme === 'dark' ? 'Switch to light theme' : 'Switch to dark theme';
}
function initTheme() {
  const saved = localStorage.getItem('theme');
  const theme = saved || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
  applyTheme(theme);
}
initTheme();
document.getElementById('themeBtn').addEventListener('click', () => {
  const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  localStorage.setItem('theme', next);
  applyTheme(next);
});

// Add a new entry (newest first) whenever there's something worth telling returning visitors
// about, and update WHATS_NEW_VERSION to match its version string. Anyone who has never seen the
// latest version (new visitors included) gets the modal showing just that entry's items; so does
// anyone who saw it but hasn't been back in a while, in case they missed it. Older entries never
// disappear -- they're still there under "Show older updates" -- this just keeps the DEFAULT view
// to "what's new since you were last here" instead of an ever-growing list of everything ever
// shipped.
const WHATS_NEW_HISTORY = [
  {
    version: '2026-07-21-5',
    date: 'July 21',
    items: [
      '**Renamed to Ash** — "Snale" is also a real in-game Cubyz creature, which caused confusion',
    ],
  },
  {
    version: '2026-07-21-4',
    date: 'July 21',
    items: [
      'Updated the codebase knowledge to the latest Cubyz commit',
      'Added the newest PR reviews and issue discussions from GitHub',
      'Re-checked existing answers against all of that for accuracy',
    ],
  },
  {
    version: '2026-07-21-3',
    date: 'July 21',
    // Bold (**text**) the headline items so the big changes stand out from small polish items --
    // order matters here, biggest/most useful first.
    items: [
      '**New AI model** — upgraded to a more accurate model',
      '**Memory** — it now remembers earlier questions in the same chat, so **follow-ups** make sense',
      'Improved accuracy on short follow-up questions that refer back to something you just asked',
      'Added an info button showing exactly what the AI and its search index are trained on',
      'Renamed to Snale AI',
      'Added a Stop button to cancel a message you’re waiting on',
      'Added a live indicator showing how many people are getting an answer right now',
      'Shows a notice when the chat is compacting older history instead of just seeming stuck',
      'Added a dark/light theme toggle (remembers your choice)',
      'Wider layout, plus Leaderboard and GitHub buttons in the header',
      'Fixed a bug where short replies could render with a broken line break',
    ],
  },
];
const WHATS_NEW_VERSION = WHATS_NEW_HISTORY[0].version;
const WHATS_NEW_INACTIVE_DAYS = 21;

function renderWhatsNewItems(items) {
  return items
    .map(item => `<li>${escapeHtml(item).replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')}</li>`)
    .join('');
}

function maybeShowWhatsNew() {
  const seenVersion = localStorage.getItem('whatsNewVersion');
  const lastVisit = localStorage.getItem('lastVisit');
  const daysSinceLastVisit = lastVisit ? (Date.now() - Number(lastVisit)) / 86400000 : Infinity;
  localStorage.setItem('lastVisit', String(Date.now()));

  if (seenVersion === WHATS_NEW_VERSION && daysSinceLastVisit < WHATS_NEW_INACTIVE_DAYS) return;

  document.getElementById('whatsNewList').innerHTML = renderWhatsNewItems(WHATS_NEW_HISTORY[0].items);

  const older = WHATS_NEW_HISTORY.slice(1);
  const historyToggle = document.getElementById('whatsNewHistoryToggle');
  const historyBody = document.getElementById('whatsNewHistory');
  if (older.length) {
    historyToggle.style.display = '';
    historyBody.innerHTML = older.map(entry => `
      <div class="history-entry">
        <div class="history-date">${escapeHtml(entry.date)}</div>
        <ul>${renderWhatsNewItems(entry.items)}</ul>
      </div>
    `).join('');
  } else {
    historyToggle.style.display = 'none';
  }
  historyBody.classList.remove('show');
  historyToggle.textContent = 'Show older updates';

  document.getElementById('whatsNewOverlay').classList.add('show');
}
document.getElementById('whatsNewHistoryToggle').addEventListener('click', () => {
  const historyBody = document.getElementById('whatsNewHistory');
  const nowShown = historyBody.classList.toggle('show');
  document.getElementById('whatsNewHistoryToggle').textContent = nowShown ? 'Hide older updates' : 'Show older updates';
});
document.getElementById('whatsNewOkBtn').addEventListener('click', () => {
  localStorage.setItem('whatsNewVersion', WHATS_NEW_VERSION);
  document.getElementById('whatsNewOverlay').classList.remove('show');
});

const messagesEl = document.getElementById('messages');
const textInput = document.getElementById('textInput');
const sendBtn = document.getElementById('sendBtn');
const newChatBtn = document.getElementById('newChatBtn');

function escapeHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// Minimal markdown-lite: fenced code blocks, inline code, bold. Nothing fancier --
// this is a lightweight app, not a full markdown renderer.
function renderContent(text) {
  // Trim first -- white-space:pre-wrap on .bubble renders a leading/trailing newline (which
  // older saved history rows may still have, from before this was fixed server-side) as a
  // literal blank line above/below the visible text.
  let html = escapeHtml(text.trim());
  html = html.replace(/```([\s\S]*?)```/g, (_, code) => `<pre><code>${code.trim()}</code></pre>`);
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
  html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  return html;
}

// Adds a hover "Copy" button to every fenced code block in a just-rendered bubble. Done as a
// post-render DOM pass rather than baked into renderContent's regex, since it needs a live
// element reference (clipboard write + button text feedback) that string replacement can't give.
function attachCopyButtons(bubbleEl) {
  bubbleEl.querySelectorAll('pre').forEach((pre) => {
    const btn = document.createElement('button');
    btn.className = 'copy-btn';
    btn.textContent = 'Copy';
    btn.addEventListener('click', async () => {
      await navigator.clipboard.writeText(pre.textContent);
      btn.textContent = 'Copied';
      setTimeout(() => { btn.textContent = 'Copy'; }, 1200);
    });
    pre.appendChild(btn);
  });
}

function buildMetaRow(meta) {
  const wrap = document.createElement('div');

  const row = document.createElement('div');
  row.className = 'msg-meta';

  if (typeof meta.elapsed_seconds === 'number') {
    const t = document.createElement('span');
    t.textContent = `${meta.elapsed_seconds}s`;
    row.appendChild(t);
  }
  if (typeof meta.response_tokens === 'number') {
    const t = document.createElement('span');
    t.textContent = `${meta.response_tokens} tokens`;
    row.appendChild(t);
  }
  if (meta.model) {
    const t = document.createElement('span');
    t.textContent = meta.model;
    row.appendChild(t);
  }

  const sources = meta.sources || [];
  let sourcesList = null;
  if (sources.length) {
    const toggle = document.createElement('button');
    toggle.className = 'sources-toggle';
    toggle.textContent = `${sources.length} source${sources.length === 1 ? '' : 's'}`;
    let open = false;
    toggle.addEventListener('click', () => {
      open = !open;
      if (open) {
        sourcesList = document.createElement('div');
        sourcesList.className = 'sources-list';
        for (const s of sources) {
          const chip = document.createElement('div');
          chip.className = 'source-chip';
          chip.textContent = `${s.collection}/${s.filename}`;
          chip.title = `similarity score: ${s.score}`;
          sourcesList.appendChild(chip);
        }
        wrap.appendChild(sourcesList);
      } else if (sourcesList) {
        sourcesList.remove();
        sourcesList = null;
      }
    });
    row.appendChild(toggle);
  }

  wrap.appendChild(row);
  return wrap;
}

async function postFeedback(messageId, value, note) {
  try {
    await fetch('/api/feedback', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message_id: messageId, feedback: value, note: note ?? null }),
    });
  } catch (e) {
    // Non-critical -- the vote/note just won't have persisted server-side. Leave the UI state
    // as-is rather than reverting, since retrying is the natural recovery here.
  }
}

function buildNoteBox(messageId, existingNote) {
  const wrap = document.createElement('div');
  wrap.className = 'feedback-note';

  const textarea = document.createElement('textarea');
  textarea.placeholder = "What's wrong with this answer? (optional, helps fix it)";
  textarea.value = existingNote || '';
  textarea.rows = 1;

  const saveBtn = document.createElement('button');
  saveBtn.textContent = 'Save';

  const savedNote = document.createElement('div');
  savedNote.className = 'feedback-note-saved';
  savedNote.style.display = 'none';

  async function save() {
    const text = textarea.value.trim();
    saveBtn.textContent = 'Saving...';
    await postFeedback(messageId, 'dislike', text);
    saveBtn.textContent = 'Save';
    if (text) {
      savedNote.textContent = 'Saved.';
      savedNote.style.display = 'block';
      setTimeout(() => { savedNote.style.display = 'none'; }, 2000);
    }
  }

  saveBtn.addEventListener('click', save);
  textarea.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      save();
    }
  });

  wrap.appendChild(textarea);
  wrap.appendChild(saveBtn);

  const container = document.createElement('div');
  container.appendChild(wrap);
  container.appendChild(savedNote);
  container._textarea = textarea;
  return container;
}

function addMessage(role, content, messageId, feedback, feedbackNote, meta, animate) {
  clearEmptyState();
  const row = document.createElement('div');
  row.className = 'msg ' + role + (animate ? ' enter' : '');
  const col = document.createElement('div');
  col.className = 'msg-col';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = renderContent(content);
  attachCopyButtons(bubble);
  col.appendChild(bubble);

  if (role === 'assistant' && meta) {
    col.appendChild(buildMetaRow(meta));
  }

  if (role === 'assistant' && messageId != null) {
    const feedbackRow = document.createElement('div');
    feedbackRow.className = 'feedback-row';
    const likeBtn = document.createElement('button');
    likeBtn.className = 'feedback-btn like' + (feedback === 'like' ? ' active' : '');
    likeBtn.title = 'Good answer';
    likeBtn.textContent = '\u{1F44D}';
    const dislikeBtn = document.createElement('button');
    dislikeBtn.className = 'feedback-btn dislike' + (feedback === 'dislike' ? ' active' : '');
    dislikeBtn.title = 'Wrong or bad answer';
    dislikeBtn.textContent = '\u{1F44E}';

    feedbackRow.appendChild(likeBtn);
    feedbackRow.appendChild(dislikeBtn);
    col.appendChild(feedbackRow);

    let noteBox = feedback === 'dislike' ? buildNoteBox(messageId, feedbackNote) : null;
    if (noteBox) col.appendChild(noteBox);

    function setActive(value) {
      likeBtn.classList.toggle('active', value === 'like');
      dislikeBtn.classList.toggle('active', value === 'dislike');
      if (noteBox) { noteBox.remove(); noteBox = null; }
      if (value === 'dislike') {
        noteBox = buildNoteBox(messageId, null);
        col.appendChild(noteBox);
        noteBox._textarea?.focus();
      }
    }

    likeBtn.addEventListener('click', () => {
      const clearing = likeBtn.classList.contains('active');
      const newValue = clearing ? null : 'like';
      setActive(newValue);
      postFeedback(messageId, newValue, null);
    });
    dislikeBtn.addEventListener('click', () => {
      const clearing = dislikeBtn.classList.contains('active');
      const newValue = clearing ? null : 'dislike';
      setActive(newValue);
      postFeedback(messageId, newValue, null);
    });
  }

  row.appendChild(col);
  messagesEl.appendChild(row);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return bubble;
}

const TYPING_DOTS_HTML = '<div class="bubble typing"><span></span><span></span><span></span></div>';
const COMPACTING_HTML = '<div class="bubble compacting-note">Compacting conversation history&hellip;</div>';

function showTyping() {
  clearEmptyState();
  const row = document.createElement('div');
  row.className = 'msg assistant';
  row.id = 'typingRow';
  row.innerHTML = TYPING_DOTS_HTML;
  messagesEl.appendChild(row);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}
function setTypingCompacting(isCompacting) {
  const row = document.getElementById('typingRow');
  if (row) row.innerHTML = isCompacting ? COMPACTING_HTML : TYPING_DOTS_HTML;
}
function hideTyping() {
  const row = document.getElementById('typingRow');
  if (row) row.remove();
}

function clearEmptyState() {
  const es = document.querySelector('.empty-state');
  if (es) es.remove();
}

function showEmptyState() {
  messagesEl.innerHTML = `<div class="empty-state">
    <h2>Ask me anything about Cubyz</h2>
    <p>Keybindings, mechanics, addon creation, engine internals, or why a PR reviewer flagged something -- I search the real docs, codebase, and review history before answering.</p>
  </div>`;
}

async function loadHistory() {
  const res = await fetch('/api/history');
  const history = await res.json();
  if (history.length === 0) {
    showEmptyState();
  } else {
    messagesEl.innerHTML = '';
    for (const m of history) addMessage(m.role, m.content, m.id, m.feedback, m.feedback_note, m.meta, false);
  }
}

let lastStatus = null;

const COLLECTION_LABELS = {
  docs: 'Docs',
  codebase: 'Codebase',
  addon_creator: 'Addon Creator',
  reviews: 'PR & Issue Reviews',
};

async function loadStatus() {
  const dot = document.getElementById('statusDot');
  const badge = document.getElementById('modelBadge');
  const capBadge = document.getElementById('capacityBadge');
  try {
    const res = await fetch('/api/status');
    const s = await res.json();
    lastStatus = s;
    dot.className = 'status-dot ok';
    dot.title = 'Connected';
    badge.innerHTML = '<span class="dot"></span>' + escapeHtml(s.model);
    const viewers = s.active_viewers != null ? s.active_viewers : 1;
    capBadge.className = 'model-badge';
    capBadge.innerHTML = '<span class="dot"></span>' + viewers + (viewers === 1 ? ' person online' : ' people online');
    capBadge.title = 'How many people currently have this website open';
  } catch (e) {
    dot.className = 'status-dot down';
    dot.title = 'Cannot reach server';
    badge.textContent = '';
    capBadge.textContent = '';
  }
}

function renderInfoBody(s) {
  const stats = s && s.training_stats;
  if (!stats) return '<p>Stats aren\'t available right now -- try again once the server finishes starting up.</p>';

  let html = '<p><span class="info-section-title">Fine-tuned model</span><br>'
    + (stats.finetune_examples != null
        ? `Trained on <b>${stats.finetune_examples.toLocaleString()}</b> examples drawn from Cubyz's real PR &amp; issue review history -- this shapes how it reasons and explains things, not the facts it knows.`
        : 'Fine-tune example count unavailable.')
    + ' <a href="https://huggingface.co/iNiKKo/ASH-P7-4B" target="_blank" rel="noopener">Available on Hugging Face</a>.'
    + '</p>';

  html += '<p><span class="info-section-title">Live search index (RAG)</span><br>'
    + 'Every question searches this index fresh -- this is where actual facts come from, not the fine-tune.</p>';

  const order = ['codebase', 'reviews', 'docs', 'addon_creator'];
  const collections = stats.collections || {};
  html += '<div>' + order.filter(k => collections[k]).map(k => {
    const c = collections[k];
    return `<div class="info-row"><span>${escapeHtml(COLLECTION_LABELS[k] || k)}</span>`
      + `<b>${c.chunks.toLocaleString()} chunks &middot; ${c.sources.toLocaleString()} source files</b></div>`;
  }).join('') + '</div>';

  return html;
}

document.getElementById('infoBtn').addEventListener('click', async () => {
  const body = document.getElementById('infoBody');
  document.getElementById('infoOverlay').classList.add('show');
  if (!lastStatus) {
    body.innerHTML = 'Loading&hellip;';
    await loadStatus();
  }
  body.innerHTML = renderInfoBody(lastStatus);
});
document.getElementById('infoOkBtn').addEventListener('click', () => {
  document.getElementById('infoOverlay').classList.remove('show');
});

function autoResize() {
  textInput.style.height = 'auto';
  textInput.style.height = Math.min(textInput.scrollHeight, 140) + 'px';
}
textInput.addEventListener('input', autoResize);

// Aborting the fetch only stops the browser from waiting on/showing the response -- the
// in-flight generation may keep running server-side (a blocking Ollama call in a thread can't be
// force-killed mid-token from here). That's fine: the point of Stop is "let me send something
// else / fix what I asked", not guaranteeing the GPU cycle is reclaimed instantly.
let activeController = null;

function setSending(isSending) {
  sendBtn.classList.toggle('stopBtn', isSending);
  sendBtn.innerHTML = isSending ? '&#9632;' : '&#10148;';
  sendBtn.title = isSending ? 'Stop' : 'Send';
}

// Polled only while a message is in flight -- cheap (one tiny GET) and short-lived, not worth a
// websocket for something that fires for at most a few seconds per turn.
let compactingPollTimer = null;
function startCompactingPoll() {
  compactingPollTimer = setInterval(async () => {
    try {
      const res = await fetch('/api/compacting');
      const data = await res.json();
      setTypingCompacting(!!data.compacting);
    } catch (e) { /* transient poll failure -- next tick tries again, not worth surfacing */ }
  }, 500);
}
function stopCompactingPoll() {
  if (compactingPollTimer) clearInterval(compactingPollTimer);
  compactingPollTimer = null;
}

async function sendMessage() {
  const text = textInput.value.trim();
  if (!text) return;

  textInput.value = '';
  autoResize();
  textInput.disabled = true;
  activeController = new AbortController();
  setSending(true);
  addMessage('user', text, null, null, null, null, true);
  showTyping();
  startCompactingPoll();

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text }),
      signal: activeController.signal,
    });
    const data = await res.json();
    hideTyping();
    if (data.error) {
      addMessage('assistant', `[Error: ${data.error}]`, null, null, null, null, true);
    } else {
      const meta = {
        model: data.model, sources: data.sources,
        prompt_tokens: data.prompt_tokens, response_tokens: data.response_tokens,
        elapsed_seconds: data.elapsed_seconds,
      };
      addMessage('assistant', data.answer, data.message_id, null, null, meta, true);
    }
  } catch (e) {
    hideTyping();
    if (e.name === 'AbortError') {
      addMessage('assistant', '[Stopped.]', null, null, null, null, true);
    } else {
      addMessage('assistant', `[Connection error: ${e.message}. The request may still be processing server-side for a slow query -- try asking again in a moment, or check "New chat" still shows your history.]`, null, null, null, null, true);
    }
  } finally {
    stopCompactingPoll();
    activeController = null;
    setSending(false);
    textInput.disabled = false;
    textInput.focus();
  }
}

sendBtn.addEventListener('click', () => {
  if (activeController) {
    activeController.abort();
  } else {
    sendMessage();
  }
});
textInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    if (!activeController) sendMessage();
  }
});

newChatBtn.addEventListener('click', async () => {
  await fetch('/api/new_chat', { method: 'POST' });
  messagesEl.innerHTML = '';
  showEmptyState();
});

loadHistory();
loadStatus();
setInterval(loadStatus, 5000);
maybeShowWhatsNew();
</script>
</body>
</html>
